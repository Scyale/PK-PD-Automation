# Lebri (lebrikizumab) sweep/timecourse config (monotherapy)
# Parameters taken from FDA_review_reconstruction.mmd (equations section; XML/UI settings ignored).

model:
  name: Lebri
  module: models.Lebri

simulation:
  # Keep YAML fixed at 25; the notebook overrides to n=1 for single-dose timecourses.
  n_doses: 25
  start_days: 0.0
  dt_days: 0.25
  solver:
    method: RK45
    rtol: 1.0e-6
    atol: 1.0e-9

params:
  # Fixed workflow
  body_weight_kg: 70.0

  # Initial conditions
  EASI0: 30.0
  AUC0: 0.0

  # PK
  Fsc: 0.86
  ka: 0.303
  Vc_ml: 3860.0
  Vp_ml: 1280.0
  Q_ml_day: 525.0
  Cl_ml_day: 156.0

  # PD (monotherapy: no *_tcs parameters)
  kout: 0.0523
  Imax: 0.83
  IC50_ugml: 16.5
  # Placebo effect constant: 1/(1+exp(-0.702))
  Pbo: 0.6687

outputs:
  pk_key: Central_ugml
  pd_key: EASI_norm

output:
  root_dir: results/Lebri_sweep
  folder_template: "{dose_mgkg}mgkg_q{interval_weeks}w"
  write_run_h5: true
  write_config_json: true
  write_summary_json: true
